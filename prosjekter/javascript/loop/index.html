<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Intro Løkker</title>
</head>
<body>

    <h1>Intro til løkker</h1>

    <h2>Alle tall 1-100</h2>
    <button onclick="alle_tall()">Alle tall 1-100</button>
    <p id="tall_resultat"></p>

    <h2>Alle partall</h2>
    <button onclick="alle_partall()">Alle partall 1-100</button>
    <p id="partall_resultat"></p>

    <h2>Alle oddetall</h2>
    <button onclick="alle_oddetall()">Alle oddetall 1-100</button>
    <p id="oddetall_resultat"></p>

    <h2>Alle tall delige med 5</h2>
    <button onclick="fem_gangen()">5 Fem gangen</button>
    <p id="fem_gangen_resultat"></p>

    <h2>Delig på 5 og partall</h2>
    <button onclick="fem_par()">Teller alle tall delig på fem og partall</button>
    <p id="fem_par_resultat"></p>

    <h2>Alle tall 0 til -100</h2>
    <button onclick="alle_minus_tall()">Teller alle tall 0 til -100</button>
    <p id="alle_minus_tall_resultat"></p>

    <h2>-10 til 10, med x^2</h2>
    <button onclick="oppgave_g()">Teller alle tall -10 til 10 med x^2</button>
    <p id="oppgave_g_resultat"></p> 

    <h2>Stjerne Loop</h2>
    <button onclick="stjerne_opg()">Stjerne Loop</button>
    <p id="stjerne_resultat2" class="stjerne_resultat"></p>
    <p id="stjerne_resultat3" class="stjerne_resultat"></p>
    <p id="stjerne_resultat4" class="stjerne_resultat"></p>
    <p id="stjerne_resultat5" class="stjerne_resultat"></p>
    <p id="stjerne_resultat6" class="stjerne_resultat"></p>


    <script src="script.js"></script>
</body>
</html>
